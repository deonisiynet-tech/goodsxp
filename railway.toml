[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[watch]
paths = [
  "/server/**",
  "/Dockerfile",
  "/.railway.json",
  "/railway.toml",
  "/package.json"
]

[deploy]
startCommand = "npx prisma migrate deploy && node dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 600
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

[healthcheck]
path = "/health"
timeout = 600
initialDelay = 60
interval = 30
retries = 3
