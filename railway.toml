[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[watch]
paths = [
  "/server/**",
  "/Dockerfile",
  "/.railway.json",
  "/railway.toml",
  "/package.json"
]

[deploy]
startCommand = "npx prisma migrate deploy && node dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
