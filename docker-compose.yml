version: '3.8'

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: shop-server
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CLIENT_URL=${CLIENT_URL}
      - JWT_SECRET=${JWT_SECRET}
      - PORT=5000
    ports:
      - '5000:5000'
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run seed && node dist/server.js"

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: shop-client
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    ports:
      - '3000:3000'
    depends_on:
      - server
